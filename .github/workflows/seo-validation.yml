name: SEO validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Validate SEO architecture and factual contracts
        run: node .github/scripts/validate-internal-architecture.mjs .
      - name: Test multilingual P14 mutations
        run: node .github/scripts/test-multilingual-p14.mjs
      - name: Test factual contract mutations
        run: node .github/scripts/test-factual-contracts.mjs
      - name: Validate static performance budgets
        run: node .github/scripts/performance-budget.mjs .
      - name: Test performance budget mutations
        run: node .github/scripts/test-performance-budget.mjs
      - name: Test production monitor
        run: node .github/scripts/test-monitor-production-seo.mjs
      - name: Test local presence audit
        run: node .github/scripts/test-local-presence-audit.mjs
      - name: Validate local presence consistency
        run: node .github/scripts/local-presence-audit.mjs . --static
