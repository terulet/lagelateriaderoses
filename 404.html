<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada | La Gelateria de Roses</title>
<meta name="description" content="La página que buscas no existe. Vuelve a La Gelateria de Roses en el idioma que prefieras.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#008E8A">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍦</text></svg>">
<style>
:root{--turquoise:#008e8a;--turquoise-dark:#006d69;--gold:#d8b35a;--cream:#fff8ec;--ink:#17312f}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at top right,rgba(216,179,90,.25),transparent 34%),linear-gradient(145deg,var(--cream),#fff 58%,#effcf9)}
main{width:min(760px,100%);text-align:center;padding:clamp(32px,7vw,72px);border:1px solid rgba(0,142,138,.2);background:rgba(255,255,255,.9);box-shadow:0 24px 70px rgba(0,80,75,.12)}
.code{margin:0;color:var(--turquoise-dark);font-size:.78rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase}
h1{margin:.7rem 0 1rem;font-family:Georgia,"Times New Roman",serif;font-size:clamp(2.2rem,7vw,4.7rem);line-height:1}
p{max-width:560px;margin:0 auto;color:#4f6865;line-height:1.7}
nav{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:2rem}
a{display:flex;align-items:center;justify-content:center;min-height:48px;padding:12px 14px;border:1px solid rgba(0,142,138,.3);color:var(--turquoise-dark);font-weight:750;text-decoration:none;transition:background .2s,color .2s,border-color .2s}
a:hover,a:focus-visible{background:var(--turquoise-dark);border-color:var(--turquoise-dark);color:#fff;outline:3px solid rgba(216,179,90,.45);outline-offset:2px}
@media(max-width:600px){nav{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<main>
  <p class="code">Error 404</p>
  <h1>Página no encontrada</h1>
  <p>Elige tu idioma para volver a La Gelateria de Roses.</p>
  <nav aria-label="Elegir idioma">
    <a href="/">Español</a>
    <a href="/ca/" lang="ca">Català</a>
    <a href="/en/" lang="en">English</a>
    <a href="/fr/" lang="fr">Français</a>
    <a href="/de/" lang="de">Deutsch</a>
    <a href="/nl/" lang="nl">Nederlands</a>
  </nav>
</main>
</body>
</html>
